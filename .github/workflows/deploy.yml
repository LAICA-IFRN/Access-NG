name: CI/CD — Access NG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r Sistema/requirements.txt

      - name: Verificar sintaxe
        run: python -m compileall Sistema

  deploy:
    name: Deploy — Servidor Linux
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            echo ">>> git pull"
            git pull origin main

            echo ">>> pip install Sistema"
            python3 -m pip install -r Sistema/requirements.txt -q

            echo ">>> pm2 reload / start"
            pm2 reload ecosystem.config.js --update-env 2>/dev/null \
              || pm2 start ecosystem.config.js

            pm2 save
            echo ">>> Deploy concluído"
