{% extends "admin/base.html" %}
{% block title %}{{ 'Editar' if usuario else 'Novo' }} Usuário{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 style="color:#c9a227; margin:0;">{{ 'Editar' if usuario else 'Novo' }} Usuário</h5>
  <a href="{{ url_for('admin_usuarios') }}" style="color:#888; font-size:.85rem;">← Voltar</a>
</div>
<div class="card" style="max-width:540px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group col-md-8">
          <label>Nome</label>
          <input name="nome" type="text" class="form-control"
                 value="{{ usuario.nome if usuario else '' }}" required>
        </div>
        <div class="form-group col-md-4">
          <label>Matrícula</label>
          <input name="matricula" type="text" class="form-control"
                 value="{{ usuario.matricula if usuario else '' }}" required>
        </div>
      </div>
      <div class="form-group">
        <label>PIN {% if usuario %}<small style="color:#555;">(deixe em branco para não alterar)</small>{% endif %}</label>
        <input name="pin" type="password" class="form-control" maxlength="4"
               {% if not usuario %}required{% endif %} placeholder="4 dígitos">
      </div>
      <div class="form-group">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="admin" id="adminCheck"
                 {% if usuario and usuario.admin %}checked{% endif %}>
          <label class="form-check-label" for="adminCheck" style="color:#c9a227;">Administrador</label>
        </div>
      </div>
      <div class="form-group">
        <label>Acesso aos Tartaros</label>
        <div style="max-height:180px; overflow-y:auto; border:1px solid #2d2d4e; border-radius:4px; padding:.5rem;">
          {% for a in ambientes %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="ambientes"
                   value="{{ a.id }}" id="amb-{{ a.id }}"
                   {% if usuario and a in usuario.ambientes %}checked{% endif %}>
            <label class="form-check-label" for="amb-{{ a.id }}" style="font-size:.9rem;">
              {{ a.nome }} <small style="color:#666;">/ {{ a.local }}</small>
            </label>
          </div>
          {% endfor %}
        </div>
      </div>
      <button type="submit" class="btn btn-gold">Salvar</button>
    </form>
  </div>
</div>
{% endblock %}
