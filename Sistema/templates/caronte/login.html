<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <title>Caronte — Acesso</title>
  <style>
    * { box-sizing:border-box; }
    body { background:#0d0d1a; color:#e0e0e0; display:flex; align-items:center;
           justify-content:center; min-height:100vh; font-size:16px; }
    .card { background:#1a1a2e; border:1px solid #2d2d4e; border-radius:12px;
            padding:2rem 1.5rem; width:100%; max-width:340px; margin:1rem; }
    .brand { color:#c9a227; font-weight:bold; letter-spacing:3px; font-size:1.6rem;
             text-align:center; margin-bottom:.25rem; }
    .subtitle { text-align:center; color:#666; font-size:.8rem; margin-bottom:1.75rem; }
    label { font-size:.8rem; color:#888; margin-bottom:.25rem; }
    .form-control { background:#0d0d1a; border:1px solid #2d2d4e; color:#e0e0e0;
                    border-radius:8px; height:48px; font-size:1rem; }
    .form-control:focus { background:#0d0d1a; border-color:#c9a227; color:#e0e0e0; box-shadow:none; }
    .btn-access { background:#c9a227; color:#000; border:none; border-radius:8px;
                  width:100%; height:48px; font-size:1rem; font-weight:600; margin-top:.5rem; }
    .btn-access:active { background:#a8871e; }
    .alert { border-radius:8px; font-size:.85rem; }
    .admin-link { text-align:center; margin-top:1.5rem; font-size:.75rem; color:#444; }
    .admin-link a { color:#555; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">&#9760; CARONTE</div>
  <div class="subtitle">Autenticador de Acesso</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST" action="{{ url_for('caronte_login_post') }}">
    <div class="form-group">
      <label>Matrícula</label>
      <input name="matricula" type="text" class="form-control"
             inputmode="numeric" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>PIN</label>
      <input name="pin" type="password" class="form-control"
             inputmode="numeric" maxlength="4" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-access">Entrar</button>
  </form>
  <div class="admin-link"><a href="{{ url_for('admin_login') }}">Painel Admin</a></div>
</div>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
